# Alertas de segurança pré-migração (SIMDNIT → SUPRA).
#
# Regras disponíveis:
#   source_row_count_gte_target
#       Bloqueia se COUNT(SIMDNIT) < COUNT(SUPRA).
#       Detecta deleção silenciosa de linhas no SIMDNIT pela equipe terceira.
#
#   no_1900_date_regression
#       Para cada par em `date_columns`: se o SUPRA já tem data válida
#       (ano != 1900) para um contrato, verifica que o SIMDNIT não voltou
#       para 1900 naquele contrato. Requer `date_columns` configurado.
#
# Campos opcionais por tabela:
#   simdnit_table   tabela SIMDNIT correspondente (padrão: mesmo nome da SUPRA)
#   join_supra      coluna de join no lado SUPRA     (padrão: contrato)
#   join_simdnit    coluna de join no lado SIMDNIT   (padrão: NU_CON_FORMATADO)
#   date_columns    pares supra/simdnit de colunas datetime a verificar

tables:

  # ── Empenhos ────────────────────────────────────────────────────────────────
  dbo.TB_SIAC_EMPENHO:
    simdnit_table: dbo.Dados_Empenho
    join_supra: contrato
    join_simdnit: NU_CON_FORMATADO
    rules:
      - source_row_count_gte_target
      - no_1900_date_regression
    date_columns:
      - supra: data_emissao_empenho
        simdnit: DT_DIA

  # ── Medições ────────────────────────────────────────────────────────────────
  dbo.TB_SIAC_MEDICAO_MAIOR:
    simdnit_table: dbo.Dados_Medicao
    join_supra: contrato
    join_simdnit: NU_CON_FORMATADO
    rules:
      - source_row_count_gte_target
      - no_1900_date_regression
    date_columns:
      - supra: data_termino_medicao
        simdnit: DT_TERMINO_MEDICAO
      - supra: data_processamento_medicao
        simdnit: DT_PROCESSAMENTO_MEDICAO

  # ── Termos Aditivos ─────────────────────────────────────────────────────────
  dbo.TB_SIAC_TERMO_ADITIVO:
    simdnit_table: dbo.Dados_Aditivo
    join_supra: contrato
    join_simdnit: NU_CON_FORMATADO
    rules:
      - source_row_count_gte_target
      - no_1900_date_regression
    date_columns:
      - supra: data_assinatura_aditivo
        simdnit: DT_ASSINATURA0
      - supra: data_paralisacao
        simdnit: DT_PARALISACAO
